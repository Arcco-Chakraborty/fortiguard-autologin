name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build exe
        run: >
          pyinstaller --onefile --windowed --name FortiGuardAutoLogin
          --collect-data customtkinter
          main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/FortiGuardAutoLogin.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build app
        run: >
          pyinstaller --onefile --windowed --name FortiGuardAutoLogin
          --collect-data customtkinter
          --hidden-import pystray._darwin
          main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/FortiGuardAutoLogin

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist-win

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: macos-app
          path: dist-mac

      - name: Rename macOS binary
        run: mv dist-mac/FortiGuardAutoLogin dist-mac/FortiGuardAutoLogin-mac

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-win/FortiGuardAutoLogin.exe
            dist-mac/FortiGuardAutoLogin-mac
